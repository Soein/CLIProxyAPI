name: 自动同步上游

on:
  schedule:
    # Automatically sync every day at 02:00 UTC (10:00 Asia/Shanghai)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 配置 Git 用户
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 记录同步认证信息
        run: |
          {
            echo "## 🔐 Sync authentication"
            echo ""
            echo "- Token source: \`GITHUB_TOKEN\`"
            echo "- Limitation: if upstream changes \`.github/workflows/*\`, GitHub may reject the push and require manual sync."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 同步上游 router-for-me/CLIProxyAPI
        id: sync_upstream
        run: |
          set -euo pipefail
          echo "🔄 开始同步上游仓库..."
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git || true
          git fetch upstream

          echo "📊 上游新提交："
          git log --oneline main..upstream/main | head -20 || echo "无新提交"

          if git merge-base --is-ancestor upstream/main main; then
            echo "✅ main 已包含上游最新提交"
            echo "did_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔀 合并上游代码..."
          git merge upstream/main --no-edit

          synced_sha="$(git rev-parse HEAD)"
          echo "✅ 合并成功: ${synced_sha}"
          git push origin HEAD:main
          echo "🚀 已推送到 GitHub"
          echo "did_push=true" >> "$GITHUB_OUTPUT"
          echo "synced_sha=${synced_sha}" >> "$GITHUB_OUTPUT"

      - name: 显式触发镜像构建
        if: success() && steps.sync_upstream.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/build-and-push.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "🚀 已通过 workflow_dispatch 触发镜像构建"

      - name: 生成同步报告
        if: success()
        run: |
          echo "## ✅ 同步成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**上游仓库**: router-for-me/CLIProxyAPI" >> $GITHUB_STEP_SUMMARY
          echo "**同步时间**: $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**认证方式**: GITHUB_TOKEN" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sync_upstream.outputs.did_push }}" = "true" ]; then
            echo "**镜像构建触发方式**: workflow_dispatch" >> $GITHUB_STEP_SUMMARY
          else
            echo "**镜像构建触发方式**: 无需构建，main 已是最新" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 最近提交" >> $GITHUB_STEP_SUMMARY
          git log --oneline HEAD~10..HEAD >> $GITHUB_STEP_SUMMARY || true

      - name: 生成失败报告
        if: failure()
        run: |
          {
            echo "## ❌ 同步失败"
            echo ""
            echo "**上游仓库**: router-for-me/CLIProxyAPI"
            echo "**Workflow 运行**: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "**认证方式**: GITHUB_TOKEN"
            echo ""
            echo "### 建议操作"
            echo "1. 查看上面的 workflow 日志。"
            echo "2. 如果 push 因 workflow 文件更新被拒绝，请本地执行 \`git fetch upstream && git merge upstream/main && git push origin main\`。"
            echo "3. 如果只是 dispatch 镜像构建失败，可手动运行 workflow \`Build and Push Docker Image\`。"
          } >> "$GITHUB_STEP_SUMMARY"
